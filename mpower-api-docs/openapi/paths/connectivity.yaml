# Connectivity Paths

/api?fields=bluetooth:
  get:
    tags:
      - Network
    summary: Get Bluetooth configuration
    description: Retrieve classic Bluetooth settings
    operationId: getBluetooth
    security:
      - sessionCookie: []
    responses:
      '200':
        description: Bluetooth configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    bluetooth:
                      $ref: '../schemas/connectivity.yaml#/Bluetooth'
      '401':
        description: Not authenticated

/api/bluetooth:
  put:
    tags:
      - Network
    summary: Update Bluetooth configuration
    description: Update classic Bluetooth settings
    operationId: updateBluetooth
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/connectivity.yaml#/Bluetooth'
    responses:
      '200':
        description: Configuration updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

