/api/command/resetToDefaults:
  post:
    tags:
      - Commands
    summary: Reset to factory defaults
    description: Reset device configuration to factory defaults
    operationId: resetToDefaults
    security:
      - sessionCookie: []
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              keepNetwork:
                type: boolean
                description: Keep network configuration
                default: false
              keepUsers:
                type: boolean
                description: Keep user accounts
                default: false
    responses:
      '200':
        description: Reset initiated
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SuccessResponse'
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

