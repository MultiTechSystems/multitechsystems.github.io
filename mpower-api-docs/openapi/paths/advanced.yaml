/api?fields=eventlog/events:
  get:
    tags:
      - Monitoring
    summary: Get event log entries
    description: Retrieve event log entries
    operationId: getEventLogEntries
    security:
      - sessionCookie: []
    parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 100
        description: Maximum entries to return
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
        description: Offset for pagination
      - name: severity
        in: query
        schema:
          type: string
        description: Filter by severity level
    responses:
      '200':
        description: Event log entries
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    events:
                      type: array
                      items:
                        $ref: '../schemas/status.yaml#/EventLogEntry'
                    total:
                      type: integer
      '401':
        description: Not authenticated

