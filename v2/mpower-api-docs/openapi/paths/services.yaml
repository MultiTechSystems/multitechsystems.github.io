# Network Services Paths

/api?fields=snmp:
  get:
    tags:
      - Network
    summary: Get SNMP configuration
    description: Retrieve SNMP agent settings
    operationId: getSnmp
    security:
      - sessionCookie: []
    responses:
      '200':
        description: SNMP configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    snmp:
                      $ref: '../schemas/services.yaml#/Snmp'
      '401':
        description: Not authenticated

/api/snmp:
  put:
    tags:
      - Network
    summary: Update SNMP configuration
    description: Update SNMP agent settings
    operationId: updateSnmp
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/services.yaml#/Snmp'
    responses:
      '200':
        description: Configuration updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

