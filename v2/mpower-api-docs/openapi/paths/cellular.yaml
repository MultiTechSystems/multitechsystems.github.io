# Cellular Paths

/api?fields=cellular:
  get:
    tags:
      - Cellular
    summary: Get cellular configuration
    description: Retrieve cellular connectivity settings
    operationId: getCellular
    security:
      - sessionCookie: []
    responses:
      '200':
        description: Cellular configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    cellular:
                      $ref: '../schemas/cellular.yaml#/Cellular'
      '401':
        description: Not authenticated

/api/cellular:
  put:
    tags:
      - Cellular
    summary: Update cellular configuration
    description: Update cellular connectivity settings
    operationId: updateCellular
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/cellular.yaml#/Cellular'
    responses:
      '200':
        description: Configuration updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

