# Advanced Features Paths

/api?fields=scada:
  get:
    tags:
      - SCADA
    summary: Get SCADA configuration
    description: Retrieve SCADA protocol settings
    operationId: getScada
    security:
      - sessionCookie: []
    responses:
      '200':
        description: SCADA configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    scada:
                      $ref: '../schemas/advanced.yaml#/Scada'
      '401':
        description: Not authenticated

/api/scada:
  put:
    tags:
      - SCADA
    summary: Update SCADA configuration
    description: Update SCADA protocol settings
    operationId: updateScada
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/advanced.yaml#/Scada'
    responses:
      '200':
        description: Configuration updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

