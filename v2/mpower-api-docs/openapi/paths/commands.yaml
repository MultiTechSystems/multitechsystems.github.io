/api/command/ping:
  post:
    tags:
      - Commands
    summary: Ping host
    description: Ping a remote host
    operationId: ping
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - host
            properties:
              host:
                type: string
                description: Host to ping
              count:
                type: integer
                description: Number of pings
                default: 4
              interface:
                type: string
                description: Source interface
    responses:
      '200':
        description: Ping results
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                result:
                  type: object
                  properties:
                    transmitted:
                      type: integer
                    received:
                      type: integer
                    loss:
                      type: number
                    rtt:
                      type: object
                      properties:
                        min:
                          type: number
                        avg:
                          type: number
                        max:
                          type: number
      '400':
        description: Invalid request
      '401':
        description: Not authenticated

/api/command/traceroute:
  post:
    tags:
      - Commands
    summary: Traceroute to host
    description: Perform traceroute to a remote host
    operationId: traceroute
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - host
            properties:
              host:
                type: string
                description: Target host
              maxHops:
                type: integer
                description: Maximum hops
                default: 30
              interface:
                type: string
                description: Source interface
    responses:
      '200':
        description: Traceroute results
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                result:
                  type: array
                  items:
                    type: object
                    properties:
                      hop:
                        type: integer
                      address:
                        type: string
                      rtt:
                        type: number
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
