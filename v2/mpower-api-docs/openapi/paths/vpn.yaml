# VPN Paths

/api?fields=ovpnTunnels:
  get:
    tags:
      - VPN
    summary: Get OpenVPN tunnels
    description: Retrieve OpenVPN tunnel configuration
    operationId: getOpenVpnTunnels
    security:
      - sessionCookie: []
    responses:
      '200':
        description: OpenVPN tunnels
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    ovpnTunnels:
                      type: array
                      items:
                        $ref: '../schemas/vpn.yaml#/OpenVpnTunnel'
      '401':
        description: Not authenticated

/api/ovpnTunnels:
  post:
    tags:
      - VPN
    summary: Create OpenVPN tunnel
    description: Create a new OpenVPN tunnel
    operationId: createOpenVpnTunnel
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/vpn.yaml#/OpenVpnTunnel'
    responses:
      '200':
        description: Tunnel created
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

  put:
    tags:
      - VPN
    summary: Update OpenVPN tunnels
    description: Update OpenVPN tunnel configuration
    operationId: updateOpenVpnTunnels
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../schemas/vpn.yaml#/OpenVpnTunnel'
    responses:
      '200':
        description: Tunnels updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

/api/ovpnTunnels/{name}:
  delete:
    tags:
      - VPN
    summary: Delete OpenVPN tunnel
    description: Delete an OpenVPN tunnel
    operationId: deleteOpenVpnTunnel
    security:
      - sessionCookie: []
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Tunnel deleted
      '401':
        description: Not authenticated
      '404':
        description: Tunnel not found

