# Device Management Paths

/api?fields=autoReboot:
  get:
    tags:
      - System
    summary: Get auto reboot configuration
    description: Retrieve automatic reboot settings
    operationId: getAutoReboot
    security:
      - sessionCookie: []
    responses:
      '200':
        description: Auto reboot configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    autoReboot:
                      $ref: '../schemas/device-management.yaml#/AutoReboot'
      '401':
        description: Not authenticated

/api/autoReboot:
  put:
    tags:
      - System
    summary: Update auto reboot configuration
    description: Update automatic reboot settings
    operationId: updateAutoReboot
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/device-management.yaml#/AutoReboot'
    responses:
      '200':
        description: Configuration updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

