# Network Schemas
# Source: mtsDeviceAPI/json/strict/*.schema.json

# DNS Configuration
Dns:
  type: object
  description: DNS server configuration
  properties:
    mode:
      type: string
      description: DNS mode
      enum:
        - STATIC
        - DHCP
        - CELLULAR
      default: STATIC
    primaryDns:
      type: string
      description: Primary DNS server
      format: ipv4
    secondaryDns:
      type: string
      description: Secondary DNS server
      format: ipv4
  required:
    - mode

# DHCP Configuration
Dhcp:
  type: object
  description: DHCP server configuration
  properties:
    enabled:
      type: boolean
      description: Enable DHCP server
      default: true
    relay:
      type: boolean
      description: Enable DHCP relay
      default: false
    relayServer:
      type: string
      description: DHCP relay server address
      format: ipv4
    pools:
      type: array
      description: DHCP address pools
      items:
        $ref: '#/DhcpPool'
  required:
    - enabled

DhcpPool:
  type: object
  description: DHCP address pool
  properties:
    name:
      type: string
      description: Pool name
      maxLength: 250
    interface:
      type: string
      description: Network interface
    startIp:
      type: string
      description: Pool start address
      format: ipv4
    endIp:
      type: string
      description: Pool end address
      format: ipv4
    leaseTime:
      type: integer
      description: Lease time (seconds)
      minimum: 60
      default: 86400
    gateway:
      type: string
      description: Default gateway
      format: ipv4
    dns1:
      type: string
      description: Primary DNS
      format: ipv4
    dns2:
      type: string
      description: Secondary DNS
      format: ipv4
    staticLeases:
      type: array
      description: Static DHCP reservations
      items:
        $ref: '#/DhcpStaticLease'
  required:
    - name
    - interface
    - startIp
    - endIp
    - leaseTime

DhcpStaticLease:
  type: object
  description: Static DHCP reservation
  properties:
    mac:
      type: string
      description: MAC address
      pattern: "^([0-9A-Fa-f]{2}:){5}([0-9A-Fa-f]{2})$"
    ip:
      type: string
      description: Reserved IP address
      format: ipv4
    hostname:
      type: string
      description: Client hostname
      maxLength: 250
  required:
    - mac
    - ip

# WiFi Configuration
Wifi:
  type: object
  description: WiFi configuration
  properties:
    mode:
      type: string
      description: WiFi mode
      enum:
        - DISABLED
        - AP
        - CLIENT
        - AP_CLIENT
      default: DISABLED
    ap:
      $ref: '#/WifiAp'
    client:
      $ref: '#/WifiClient'
  required:
    - mode

WifiAp:
  type: object
  description: WiFi Access Point configuration
  properties:
    enabled:
      type: boolean
      default: false
    ssid:
      type: string
      description: Network name
      maxLength: 32
    broadcast:
      type: boolean
      description: Broadcast SSID
      default: true
    channel:
      type: integer
      description: WiFi channel (0 = auto)
      minimum: 0
      maximum: 14
      default: 0
    security:
      type: object
      properties:
        mode:
          type: string
          enum:
            - NONE
            - WPA
            - WPA2
            - WPA-WPA2
            - WPA3
            - WPA2-WPA3
          default: WPA2
        psk:
          type: string
          description: Pre-shared key (8-63 chars for WPA/WPA2, 8-128 for SAE)
          minLength: 8
          maxLength: 128
  required:
    - enabled

WifiClient:
  type: object
  description: WiFi client configuration
  properties:
    enabled:
      type: boolean
      default: false
    ssid:
      type: string
      description: Network name to connect to
      maxLength: 32
    security:
      type: object
      properties:
        mode:
          type: string
          enum:
            - NONE
            - WPA
            - WPA2
            - WPA-WPA2
            - WPA3
          default: WPA2
        psk:
          type: string
          description: Pre-shared key
  required:
    - enabled

# Network Interfaces
NetworkInterface:
  type: object
  description: Network interface configuration
  properties:
    name:
      type: string
      description: Interface name (eth0, br0, etc.)
    nitype:
      type: string
      description: Interface type
      enum:
        - ETHERNET
        - BRIDGE
        - CELLULAR
        - WIFI
        - LOOPBACK
    type:
      type: string
      description: WAN or LAN
      enum:
        - WAN
        - LAN
    enabled:
      type: boolean
      default: true
    ipv4:
      $ref: '#/InterfaceIpv4'
    ipv6:
      $ref: '#/InterfaceIpv6'
  required:
    - name
    - nitype

InterfaceIpv4:
  type: object
  description: IPv4 configuration
  properties:
    mode:
      type: string
      enum:
        - DISABLED
        - STATIC
        - DHCP
      default: DHCP
    ip:
      type: string
      format: ipv4
    mask:
      type: string
      format: ipv4
    gateway:
      type: string
      format: ipv4
    dns1:
      type: string
      format: ipv4
    dns2:
      type: string
      format: ipv4
  required:
    - mode

InterfaceIpv6:
  type: object
  description: IPv6 configuration
  properties:
    mode:
      type: string
      enum:
        - DISABLED
        - STATIC
        - DHCP
        - SLAAC
      default: DISABLED
    ip:
      type: string
      format: ipv6
    prefixLength:
      type: integer
      minimum: 1
      maximum: 128
    gateway:
      type: string
      format: ipv6

# Static Routes
Route:
  type: object
  description: Static route
  properties:
    enabled:
      type: boolean
      default: true
    destination:
      type: string
      description: Destination network
      format: ipv4
    netmask:
      type: string
      description: Network mask
      format: ipv4
    gateway:
      type: string
      description: Gateway address
      format: ipv4
    interface:
      type: string
      description: Output interface
    metric:
      type: integer
      description: Route metric
      minimum: 0
      maximum: 9999
      default: 0
  required:
    - enabled
    - destination
    - netmask

# WAN Manager
WanManager:
  type: object
  description: WAN failover and load balancing
  properties:
    mode:
      type: string
      description: WAN manager mode
      enum:
        - CONSTANT
        - FAILOVER
      default: FAILOVER
    wans:
      type: array
      description: WAN interface configurations
      items:
        $ref: '#/WanConfig'
  required:
    - mode
    - wans

WanConfig:
  type: object
  description: WAN interface configuration
  properties:
    interface:
      type: string
      description: Interface name
    virtualIface:
      type: boolean
    weight:
      type: integer
      description: Load balancing weight
      minimum: 0
    priority:
      type: integer
      description: Failover priority
      minimum: 0
    monitor:
      $ref: '#/WanMonitor'
  required:
    - interface
    - weight
    - priority
    - monitor

WanMonitor:
  type: object
  description: WAN health monitoring
  properties:
    mode:
      type: string
      enum:
        - ACTIVE
        - PASSIVE
      default: ACTIVE
    checkInterval:
      type: integer
      description: Check interval (seconds)
      minimum: 5
      maximum: 9999
      default: 60
    active:
      type: object
      properties:
        hostname:
          type: string
          description: Host to check
          default: www.google.com
        type:
          type: string
          enum:
            - ICMP
            - TCP
          default: ICMP
        tcpPort:
          type: integer
          minimum: 1
          maximum: 65535
          default: 80
        icmpCount:
          type: integer
          minimum: 1
          maximum: 200
          default: 10
  required:
    - mode
    - checkInterval
    - active

# WAN Info (read-only)
WanInfo:
  type: object
  description: WAN interface status
  properties:
    wans:
      type: array
      items:
        type: object
        properties:
          interface:
            type: string
          name:
            type: string
          type:
            type: string
          current:
            type: boolean
          available:
            type: boolean
          enabled:
            type: boolean
          ip:
            type: string
            format: ipv4
          subnet:
            type: string
          gateway:
            type: string
            format: ipv4

# DDNS
Ddns:
  type: object
  description: Dynamic DNS configuration
  properties:
    enabled:
      type: boolean
      default: false
    domain:
      type: string
      description: Domain name to update
      maxLength: 250
    mode:
      type: string
      enum:
        - PROVIDER
        - CUSTOM
      default: PROVIDER
    server:
      type: string
      description: DDNS provider server
      maxLength: 250
    custom:
      type: object
      properties:
        server:
          type: string
          maxLength: 250
        path:
          type: string
          maxLength: 256
        port:
          type: integer
          minimum: 0
          maximum: 65535
        ssl:
          type: boolean
          default: false
    checkIp:
      type: object
      properties:
        enabled:
          type: boolean
          default: true
        mode:
          type: string
          enum:
            - DEFAULT
            - CUSTOM
          default: DEFAULT
        custom:
          type: object
          properties:
            server:
              type: string
            path:
              type: string
              default: "/"
            port:
              type: integer
            ssl:
              type: boolean
    authentication:
      type: object
      properties:
        username:
          type: string
          maxLength: 128
        password:
          type: string
          maxLength: 256
    updateInterval:
      type: integer
      description: Update interval (days)
      minimum: 1
      maximum: 30
      default: 5
    checkIpPeriod:
      type: integer
      description: IP check period (minutes)
      minimum: 1
      maximum: 14400
      default: 15
  required:
    - enabled
    - domain
    - mode
