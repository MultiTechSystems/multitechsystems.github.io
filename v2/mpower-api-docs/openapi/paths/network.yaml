# Network Paths

/api?fields=wifi:
  get:
    tags:
      - Network
    summary: Get WiFi configuration
    description: Retrieve WiFi settings
    operationId: getWifi
    security:
      - sessionCookie: []
    responses:
      '200':
        description: WiFi configuration
        content:
          application/json:
            schema:
              type: object
              properties:
                result:
                  type: object
                  properties:
                    wifi:
                      $ref: '../schemas/network.yaml#/Wifi'
      '401':
        description: Not authenticated

/api/wifi:
  put:
    tags:
      - Network
    summary: Update WiFi configuration
    description: Update WiFi settings
    operationId: updateWifi
    security:
      - sessionCookie: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/network.yaml#/Wifi'
    responses:
      '200':
        description: Configuration updated
      '400':
        description: Invalid request
      '401':
        description: Not authenticated
      '403':
        description: Insufficient permissions

