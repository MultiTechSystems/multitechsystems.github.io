{
  "openapi": "3.0.3",
  "info": {
    "title": "MTS Device API",
    "description": "RESTful API for managing MTS IoT devices (mPower Edge Intelligence platform).\n\nThis API provides comprehensive device management capabilities including:\n- System configuration and monitoring\n- Cellular connectivity management\n- Network configuration (WiFi, Ethernet, VPN)\n- User authentication and authorization\n- LoRa network management\n- SCADA protocols\n- Docker container management\n- Firmware updates and diagnostics\n\n## Authentication\n\nThe API uses session-based authentication with cookies. Users must first authenticate\nvia the `/api/login` endpoint to obtain a session cookie, which is then used for\nsubsequent API requests.\n\n## API Structure\n\nThe API follows a resource-based structure where most endpoints follow the pattern:\n- `GET /api?fields=<resource>` - Retrieve resource data\n- `PUT /api/<resource>` - Update resource configuration\n- `POST /api/command/<action>` - Execute commands\n- `DELETE /api/<resource>/<id>` - Delete resource items\n\n## Permissions\n\nThe API supports role-based access control (RBAC) with three built-in roles:\n- **Admin**: Full access to all endpoints and operations\n- **Engineer** (User): Read and modify access to most configuration\n- **Monitor** (Guest): Read-only access to status and monitoring data\n\n## Schema Documentation\n\nDetailed schema documentation extracted from source code is available in the\nseparate schema files under the `schemas/` directory.\n",
    "version": "2.0.0",
    "contact": {
      "name": "Multi-Tech Systems",
      "url": "https://www.multitech.com"
    },
    "license": {
      "name": "Proprietary"
    }
  },
  "servers": [
    {
      "url": "http://{device-ip}",
      "description": "Device local network access",
      "variables": {
        "device-ip": {
          "default": "192.168.2.1",
          "description": "IP address of the MTS device"
        }
      }
    },
    {
      "url": "https://{device-ip}",
      "description": "Secure device local network access",
      "variables": {
